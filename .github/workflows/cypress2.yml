name: Execução Agendada

on:
  schedule:
    # Executa toda quarta-feira às 19h UTC
    - cron: '0 19 * * 3'

  # Permite execução manual também
  workflow_dispatch:

jobs:
  e2e-tests:

    runs-on: ubuntu-latest

    steps:

      # Clona o repositório
      - name: Checkout do projeto
        uses: actions/checkout@v4

      # Configura Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      # Instala Yarn
      - name: Instalar Yarn
        run: npm install -g yarn

      # Instala dependências
      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      # Instala Cypress
      - name: Instalar Cypress
        run: npx cypress install

      # Executa testes Cypress
      - name: Executar testes E2E
        run: npx cypress run

      # Salva screenshots gerados
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-cypress
          path: cypress/screenshots

      # Salva vídeos dos testes
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-cypress
          path: cypress/videos